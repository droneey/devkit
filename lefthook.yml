pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,md,yaml,yml}"
      stage_fixed: true
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}

    - name: eslint
      glob: "*.{ts,tsx}"
      exclude: "**/templates/**"
      stage_fixed: true
      run: bunx eslint --fix {staged_files}

    - name: validate-branch
      run: |
        BRANCH=$(git branch --show-current)
        if ! echo "$BRANCH" | grep -qE '^(feature|fix|hotfix)/[0-9]+-[a-z]+(-[a-z]+)*$'; then
          echo "Branch '$BRANCH' must match: (feature|fix|hotfix)/{id}-{name}"
          exit 1
        fi

commit-msg:
  jobs:
    - name: commitlint
      run: bun --bun x --no -- commitlint --edit {1}
