name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: |
          for pkg in packages/typescript/libs/*/; do
            if [ -f "$pkg/package.json" ] && grep -q '"build"' "$pkg/package.json"; then
              echo "Building $pkg"
              cd "$pkg" && bun run build && cd -
            fi
          done

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          for pkg in packages/typescript/libs/*/; do
            if [ -f "$pkg/package.json" ] && [ "$(jq -r '.private // false' "$pkg/package.json")" != "true" ]; then
              echo "Publishing $(jq -r '.name' "$pkg/package.json")"
              cd "$pkg" && npm publish --access public || true && cd -
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo "## Packages"
            echo ""
            for pkg in packages/typescript/libs/*/package.json; do
              name=$(jq -r '.name' "$pkg")
              version=$(jq -r '.version' "$pkg")
              echo "- \`${name}@${version}\`"
            done
            echo ""
            echo "## What's Changed"
            echo ""

            # Group by type
            FEATURES=$(git log "$RANGE" --pretty=format:"%s" --grep="^feat" | sed 's/^/- /')
            FIXES=$(git log "$RANGE" --pretty=format:"%s" --grep="^fix" | sed 's/^/- /')
            OTHER=$(git log "$RANGE" --pretty=format:"%s" --invert-grep --grep="^feat" --grep="^fix" --grep="^chore: Release" --grep="^chore: Version" | sed 's/^/- /')

            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.body }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
