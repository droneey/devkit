name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: |
          for pkg in packages/typescript/libs/*/; do
            if [ -f "$pkg/package.json" ] && grep -q '"build"' "$pkg/package.json"; then
              echo "Building $pkg"
              cd "$pkg" && bun run build && cd -
            fi
          done

      - name: Check for changesets
        id: changesets
        run: |
          if bun --bun x changeset status 2>&1 | grep -q "No changesets present"; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bun --bun x changeset version
          git add .
          git diff --cached --quiet || git commit -m "chore: Version packages" --no-verify && git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun --bun x changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
