name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - name: Verify
        run: bun lint:check && bun lint:packages && bun test

      - name: Build packages
        run: |
          for pkg in packages/typescript/libs/*/; do
            if [ -f "$pkg/package.json" ] && grep -q '"build"' "$pkg/package.json"; then
              echo "Building $pkg"
              (cd "$pkg" && bun run build)
            fi
          done

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          for pkg in packages/typescript/libs/*/; do
            if [ -f "$pkg/package.json" ] && [ "$(jq -r '.private // false' "$pkg/package.json")" != "true" ]; then
              PKG_NAME=$(jq -r '.name' "$pkg/package.json")
              echo "Publishing $PKG_NAME"
              OUTPUT=$(cd "$pkg" && npm publish --access public 2>&1) || {
                if echo "$OUTPUT" | grep -q "You cannot publish over the previously published versions"; then
                  echo "Already published $PKG_NAME, skipping."
                else
                  echo "::error::Failed to publish $PKG_NAME"
                  echo "$OUTPUT"
                  exit 1
                fi
              }
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          BODY=""

          # Package list
          BODY="${BODY}## Packages"$'\n\n'
          for pkg in packages/typescript/libs/*/package.json; do
            name=$(jq -r '.name' "$pkg")
            version=$(jq -r '.version' "$pkg")
            BODY="${BODY}- \`${name}@${version}\`"$'\n'
          done

          # Changelog only if previous tag exists
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"

            FEATURES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" --no-merges)
            FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" --no-merges)

            BODY="${BODY}"$'\n'"## What's Changed"$'\n\n'

            if [ -n "$FEATURES" ]; then
              BODY="${BODY}### Features"$'\n'"${FEATURES}"$'\n\n'
            fi
            if [ -n "$FIXES" ]; then
              BODY="${BODY}### Fixes"$'\n'"${FIXES}"$'\n\n'
            fi

            BODY="${BODY}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          else
            BODY="${BODY}"$'\n'"Initial release."
          fi

          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$BODY"
        env:
          TAG: ${{ github.ref_name }}
          BODY: ${{ steps.changelog.outputs.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
