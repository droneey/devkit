pre-commit:
  parallel: true
  jobs:
    - name: validate-branch
      run: |
        BRANCH=$(git branch --show-current)
        if ! echo "$BRANCH" | grep -qE '^(feature|fix|hotfix)/[0-9]+-[a-z]+(-[a-z]+)*$'; then
          echo "Branch '$BRANCH' must match: (feature|fix|hotfix)/{id}-{name}"
          exit 1
        fi

commit-msg:
  jobs:
    - name: commitlint
      run: |
        MSG=$(head -1 {1})

        if [ ${#MSG} -gt 100 ]; then
          echo "Header must be 100 characters or less (got ${#MSG})"
          exit 1
        fi

        TYPE=$(echo "$MSG" | sed -n 's/^\([a-z]*\):.*/\1/p')
        SUBJECT=$(echo "$MSG" | sed -n 's/^[a-z]*: *\(.*\)/\1/p')

        if [ -z "$TYPE" ] || [ -z "$SUBJECT" ]; then
          echo "Commit must match format: type: Subject"
          exit 1
        fi

        case "$TYPE" in
          feat|fix|perf|refactor|style|test|docs|build|ci|chore) ;;
          *) echo "Invalid type '$TYPE'. Allowed: feat, fix, perf, refactor, style, test, docs, build, ci, chore"; exit 1 ;;
        esac

        FIRST_CHAR=$(echo "$SUBJECT" | cut -c1)
        if ! echo "$FIRST_CHAR" | grep -q '[A-Z]'; then
          echo "Subject must start with an uppercase letter (sentence-case)"
          exit 1
        fi

        BODY=$(sed '1d;/^#/d;/^$/d' {1})
        if [ -n "$BODY" ]; then
          echo "Body and footer must be empty"
          exit 1
        fi
